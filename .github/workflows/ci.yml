name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Validate content
        run: bun run validate:content

      # 翻訳の不変条件(フェンス本文のバイト一致・URL 集合・日本語散文)を、
      # マニフェストに記録された sourceCommit 時点の原文と照合して検証する。
      # 上流 HEAD が記録より進んでいても全レコードが検査対象になる。
      - name: Clone upstream (awslabs/aidlc-workflows v2)
        run: git clone --branch v2 --single-branch https://github.com/awslabs/aidlc-workflows.git "$RUNNER_TEMP/aidlc-upstream"

      - name: Validate translation invariants against recorded upstream
        run: bun scripts/validate-content.ts --upstream "$RUNNER_TEMP/aidlc-upstream" --at-recorded

      - name: Build
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: End-to-end tests
        run: bun run test:e2e
        env:
          CI: true
